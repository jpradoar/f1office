name: "🏎️ Reportar Resultado de Carrera"
description: "Registra los resultados de una carrera para actualizar el campeonato y el ELO"
title: "[CARRERA] "
labels: ["carrera-pendiente"]
body:
  - type: markdown
    attributes:
      value: |
        > El campo **Tiempo** puede estar pre-completado si el hardware capturó el tiempo automáticamente. Verificá que sea correcto antes de enviar.

  - type: dropdown
    id: campeonato
    attributes:
      label: Campeonato
      description: Campeonato al que pertenece esta carrera
      options:
        - temporada_oficina_2026
        - gran_premio_viernes
        - copa_invierno
        - copa_verano
        - demo
    validations:
      required: true

  - type: dropdown
    id: pista
    attributes:
      label: Pista
      description: Tipo de circuito
      options:
        - ovalo
        - monaco
        - interna
    validations:
      required: true

  - type: input
    id: tiempo
    attributes:
      label: Tiempo
      description: "Tiempo del ganador - formato MM:SS.mmm"
      placeholder: "02:15.340"
    validations:
      required: true

  - type: dropdown
    id: pos1
    attributes:
      label: Pos 1
      description: "🥇 Ganador"
      options:
        - carlos,QA,🇪🇸
        - salva,QA,🇪🇸
        - jony,INFRA,🇦🇷
        - ana,RANDOM,🏁
        - juan,RANDOM,🏁
        - leo,RANDOM,🏁
    validations:
      required: true

  - type: dropdown
    id: pos2
    attributes:
      label: Pos 2
      description: "🥈 Segundo"
      options:
        - carlos,QA,🇪🇸
        - salva,QA,🇪🇸
        - jony,INFRA,🇦🇷
        - ana,RANDOM,🏁
        - juan,RANDOM,🏁
        - leo,RANDOM,🏁
    validations:
      required: true

  - type: dropdown
    id: pos3
    attributes:
      label: Pos 3
      description: "🥉 Tercero"
      options:
        - carlos,QA,🇪🇸
        - salva,QA,🇪🇸
        - jony,INFRA,🇦🇷
        - ana,RANDOM,🏁
        - juan,RANDOM,🏁
        - leo,RANDOM,🏁
    validations:
      required: true

  - type: dropdown
    id: pos4
    attributes:
      label: Pos 4
      description: "4º Puesto - opcional"
      options:
        - "---"
        - carlos,QA,🇪🇸
        - salva,QA,🇪🇸
        - jony,INFRA,🇦🇷
        - ana,RANDOM,🏁
        - juan,RANDOM,🏁
        - leo,RANDOM,🏁

  - type: dropdown
    id: pos5
